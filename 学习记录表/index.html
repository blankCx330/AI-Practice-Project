<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习计划管理器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header-title">学习计划管理器</h1>
      <div class="header-actions">
        <button class="btn btn-primary" id="addPlanBtn">添加计划</button>
        <button class="btn btn-secondary" id="exportBtn" title="导出数据">导出</button>
        <button class="btn btn-secondary" id="importBtn" title="导入数据">导入</button>
        <input type="file" id="importFile" accept=".json" style="display: none;">
      </div>
    </header>

    <!-- Stats Overview -->
    <section class="stats">
      <div class="stat-card">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">总计划数</span>
      </div>
      <div class="stat-card stat-card--completed">
        <span class="stat-number" id="completedCount">0</span>
        <span class="stat-label">已完成</span>
      </div>
      <div class="stat-card stat-card--progress">
        <span class="stat-number" id="inProgressCount">0</span>
        <span class="stat-label">进行中</span>
      </div>
      <div class="stat-card stat-card--pending">
        <span class="stat-number" id="pendingCount">0</span>
        <span class="stat-label">未开始</span>
      </div>
    </section>

    <!-- Filter & Search -->
    <section class="filters">
      <div class="filter-group">
        <select id="typeFilter" class="select">
          <option value="all">全部类型</option>
          <option value="daily">每日计划</option>
          <option value="weekly">每周计划</option>
          <option value="monthly">月度计划</option>
          <option value="longterm">长期目标</option>
        </select>
        <select id="statusFilter" class="select">
          <option value="all">全部状态</option>
          <option value="pending">未开始</option>
          <option value="in_progress">进行中</option>
          <option value="completed">已完成</option>
        </select>
        <select id="sortBy" class="select">
          <option value="createdAt">按创建时间</option>
          <option value="endDate">按截止日期</option>
          <option value="progress">按进度</option>
        </select>
      </div>
      <div class="search-group">
        <input type="text" id="searchInput" class="input" placeholder="搜索计划...">
      </div>
    </section>

    <!-- Plan List -->
    <main class="plan-list" id="planList">
      <!-- Plans will be rendered here -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📚</div>
      <h3 class="empty-title">暂无学习计划</h3>
      <p class="empty-text">点击上方"添加计划"按钮创建你的第一个学习计划</p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="planModal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">添加计划</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form class="form" id="planForm">
        <input type="hidden" id="planId">
        
        <div class="form-group">
          <label class="form-label" for="planTitle">计划标题 *</label>
          <input type="text" id="planTitle" class="input" required 
                 placeholder="例如：学习React Hooks">
        </div>

        <div class="form-group">
          <label class="form-label" for="planType">计划类型 *</label>
          <select id="planType" class="select" required>
            <option value="daily">每日计划</option>
            <option value="weekly">每周计划</option>
            <option value="monthly">月度计划</option>
            <option value="longterm">长期目标</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="planStartDate">开始日期</label>
            <input type="date" id="planStartDate" class="input">
          </div>
          <div class="form-group">
            <label class="form-label" for="planEndDate">截止日期</label>
            <input type="date" id="planEndDate" class="input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="planStatus">状态</label>
          <select id="planStatus" class="select">
            <option value="pending">未开始</option>
            <option value="in_progress">进行中</option>
            <option value="completed">已完成</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">进度: <span id="progressValue">0</span>%</label>
          <input type="range" id="planProgress" class="range" 
                 min="0" max="100" value="0">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="deleteModal">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--small">
      <div class="modal-header">
        <h2 class="modal-title">确认删除</h2>
        <button class="modal-close" id="deleteModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要删除这个计划吗？此操作无法撤销。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>

  <script src="js/models/plan.js"></script>
  <script src="js/models/task.js"></script>
  <script src="js/utils/date.js"></script>
  <script src="js/utils/errorHandler.js"></script>
  <script src="js/utils/notification.js"></script>
  <script src="js/utils/formValidator.js"></script>
  <script src="js/utils/migration.js"></script>
  <script src="js/utils/taskUI.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 初始化全局错误处理
    document.addEventListener('DOMContentLoaded', () => {
      if (window.ErrorHandler) {
        window.ErrorHandler.init();
      }
      if (window.FormValidator) {
        window.FormValidator.bindRealTimeValidation();
      }
      // 执行数据迁移
      if (window.Migration) {
        window.Migration.migrateAll();
      }
    });
  </script>
</body>
</html>
